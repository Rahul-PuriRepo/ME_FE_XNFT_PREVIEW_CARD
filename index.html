<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Preview Card</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <main class="card">

        <div class="card__images">
            <img
                src="./assets/image-equilibrium.jpg"
                alt="Equilibrium NFT"
                class="card__image"
            >

            <div class="card__images-layer">
                <img
                    src="./assets/icon-view.svg"
                    alt="View Icon"
                >
            </div>
        </div>

        <div class="card__title">
            <h1>Equilibrium #3429</h1>

            <p id="info">
                Our Equilibrium collection promotes balance and calm.
            </p>
        </div>

        <div class="card__time">

            <div class="card__time-left">
                <img
                    src="./assets/icon-ethereum.svg"
                    alt="Ethereum"
                >
                <span>0.041 ETH</span>
            </div>

            <div class="card__time-right">
                <img
                    src="./assets/icon-clock.svg"
                    alt="Clock"
                >
                <span>3 days left</span>
            </div>

        </div>

        <hr>

        <div class="card__creator">

            <img
                src="./assets/logo.jpeg"
                alt="Creator"
            >

            <p>
                Creation of
                <span>Ketan Makode</span>
            </p>

        </div>

    </main>

    <footer class="attribution">
        Challenge by
        <a
            href="https://www.crio.do"
            target="_blank"
            rel="noopener noreferrer"
        >
            Crio.Do
        </a>

        Coded by

        <a
    href="https://www.github.com/Rahul-PuriRepo"
    target="_blank"
    rel="noopener noreferrer"
>
    Rahul Puri
</a>
    </footer>

</body>
</html>
